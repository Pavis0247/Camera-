<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0B0E11">
<title>APX</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 120 120'%3E%3Crect width='120' height='120' fill='%230B0E11'/%3E%3Crect x='20' y='20' width='30' height='30' fill='%23E8ECEF'/%3E%3Crect x='70' y='20' width='30' height='30' fill='%23A8D94E'/%3E%3Crect x='45' y='45' width='30' height='30' fill='%23E8ECEF'/%3E%3Crect x='20' y='70' width='30' height='30' fill='%23E8ECEF'/%3E%3Crect x='70' y='70' width='30' height='30' fill='%23F23B8C'/%3E%3C/svg%3E">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0 }
  body { background: #0B0E11; color: #E8ECEF; font-family: 'Inter', -apple-system, sans-serif }
  .wrap { max-width: 480px; margin: 0 auto; padding-bottom: 96px; min-height: 100vh }
  .mono { font-family: 'IBM Plex Mono', monospace }
  .muted { color: #6B7480 }
  button { cursor: pointer; font-family: inherit; border: none; background: none; color: inherit }
  @keyframes pulse { 0% { transform: scale(1); opacity: .5 } 70% { transform: scale(2.2); opacity: 0 } 100% { opacity: 0 } }
  .pulse { position: relative; display: inline-flex; width: 10px; height: 10px; flex-shrink: 0 }
  .pulse .ring { position: absolute; inset: 0; border-radius: 50%; opacity: .5 }
  .pulse.on .ring { animation: pulse 2s ease-out infinite }
  .pulse .dot { position: absolute; inset: 2px; border-radius: 50% }
  .card { background: #14181D; border: 1px solid #1F252B; border-radius: 14px; padding: 18px; margin-bottom: 14px }
  .pill { padding: 8px 18px; border-radius: 999px; border: 1px solid #1F252B; color: #6B7480; font-size: 12px; font-weight: 600 }
  .pill.on { background: #1F252B; color: #E8ECEF; border-color: #2a3138 }
  .btn-row { display: flex; gap: 8px; margin-top: 14px }
  .btn-sm { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #1F252B; font-size: 12px }
  .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 16px }
  .lbl { font-size: 10px; color: #6B7480; text-transform: uppercase; letter-spacing: .6px }
  .sec { font-size: 11px; color: #6B7480; text-transform: uppercase; letter-spacing: .8px; margin: 18px 0 10px }
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.6); backdrop-filter: blur(2px); display: flex; align-items: flex-end; z-index: 50 }
  .sheet { background: #14181D; width: 100%; max-width: 480px; margin: 0 auto; max-height: 85vh; overflow-y: auto; border-radius: 16px 16px 0 0; border: 1px solid #1F252B; padding: 24px 20px 32px }
  .btn-big { width: 100%; padding: 14px; border-radius: 10px; font-size: 15px; font-weight: 600; margin-bottom: 10px }
  .btn-ghost { width: 100%; padding: 14px; border-radius: 10px; border: 1px solid #1F252B; font-size: 15px; color: #E8ECEF }
  #toast { position: fixed; bottom: 86px; left: 50%; transform: translateX(-50%); background: #1F252B; border: 1px solid #2a3138; border-radius: 999px; padding: 10px 20px; font-size: 13px; z-index: 60; white-space: nowrap; max-width: 92%; overflow: hidden; text-overflow: ellipsis; display: none }
  .tabbar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: rgba(11,14,17,.92); backdrop-filter: blur(12px); border-top: 1px solid #1F252B; display: flex; padding: 10px 0 max(22px, env(safe-area-inset-bottom)) }
  .tabbar button { flex: 1; font-size: 13px; color: #6B7480 }
  .tabbar button.on { color: #E8ECEF; font-weight: 600 }
  input[type=range] { width: 100%; height: 4px }
  .evt { display: flex; gap: 10px; padding: 10px 2px; border-bottom: 1px solid #14181D; align-items: flex-start }
  .switch { width: 44px; height: 24px; border-radius: 999px; position: relative; background: #1F252B; transition: background .2s }
  .switch .knob { position: absolute; top: 3px; left: 3px; width: 18px; height: 18px; border-radius: 50%; background: #E8ECEF; transition: left .2s }
  .switch.on .knob { left: 23px }
</style>
</head>
<body>
<div class="wrap">
  <!-- Header -->
  <div style="padding:20px 20px 0">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div style="display:flex;align-items:center;gap:10px">
        <svg height="15" viewBox="0 0 408 120">
          <rect x="0" y="0" width="120" height="24" fill="#E8ECEF"/><rect x="92" y="24" width="28" height="24" fill="#E8ECEF"/><rect x="0" y="48" width="120" height="24" fill="#E8ECEF"/><rect x="0" y="72" width="28" height="24" fill="#E8ECEF"/><rect x="92" y="72" width="28" height="24" fill="#E8ECEF"/><rect x="0" y="96" width="120" height="24" fill="#E8ECEF"/>
          <rect x="144" y="0" width="120" height="24" fill="#E8ECEF"/><rect x="144" y="24" width="28" height="24" fill="#E8ECEF"/><rect x="236" y="24" width="28" height="24" fill="#E8ECEF"/><rect x="144" y="48" width="120" height="24" fill="#E8ECEF"/><rect x="144" y="72" width="28" height="24" fill="#E8ECEF"/><rect x="144" y="96" width="28" height="24" fill="#E8ECEF"/>
          <rect x="288" y="0" width="40" height="40" fill="#E8ECEF"/><rect x="368" y="0" width="40" height="40" fill="#A8D94E"/><rect x="328" y="40" width="40" height="40" fill="#E8ECEF"/><rect x="288" y="80" width="40" height="40" fill="#E8ECEF"/><rect x="368" y="80" width="40" height="40" fill="#F23B8C"/>
        </svg>
        <span id="acct" class="mono muted" style="font-size:11px">conectando…</span>
      </div>
      <div style="display:flex;align-items:center;gap:6px">
        <span class="pulse" id="liveDot"><span class="ring"></span><span class="dot"></span></span>
        <span id="liveTxt" class="mono" style="font-size:11px;color:#6B7480">—</span>
      </div>
    </div>
    <div style="margin-top:18px">
      <div class="lbl">Equity</div>
      <div style="display:flex;align-items:baseline;gap:12px">
        <span id="equity" class="mono" style="font-size:34px;font-weight:700;letter-spacing:-1px">—</span>
        <span id="dayPl" class="mono" style="font-size:14px;font-weight:600"></span>
      </div>
    </div>
    <div id="spark" style="margin:10px -4px 0;height:56px"></div>
  </div>

  <div id="content" style="padding:8px 20px 0"></div>
</div>

<div id="toast"></div>
<div id="sheetHost"></div>

<div class="tabbar">
  <button data-tab="panel" class="on">Panel</button>
  <button data-tab="mercado">Mercado</button>
  <button data-tab="trades">Trades</button>
</div>

<script>
// ════════════ CONFIGURACIÓN ════════════
const FIREBASE = "https://apx-trading-ec0fa-default-rtdb.firebaseio.com";
const SECRET   = "apx-pabloapx-0247";
const BASE     = FIREBASE + "/" + SECRET;
const POLL_MS  = 6000;

const EA_META = {
  apex:   { name: "ApexGold",    symbol: "XAUUSD", tf: "M15", color: "#F5A623", digits: 2 },
  london: { name: "LondonBreak", symbol: "US30",   tf: "M5",  color: "#3BC8E0", digits: 1 },
};
const PARAM_DEFS = {
  apex: [
    { key: "risk",      label: "Riesgo por trade",  min: 0.25, max: 2,    step: 0.25, unit: "%" },
    { key: "bayes",     label: "Umbral Bayes",      min: 0.5,  max: 0.85, step: 0.05, unit: "" },
    { key: "maxspread", label: "Spread máximo",     min: 20,   max: 60,   step: 5,    unit: "pts" },
    { key: "session",   label: "Filtro de sesiones", type: "toggle", hint: "ON: opera solo en las sesiones configuradas · OFF: opera 24/5" },
  ],
  london: [
    { key: "risk",      label: "Riesgo por trade",    min: 0.25, max: 1.5, step: 0.25, unit: "%" },
    { key: "rr",        label: "Ratio R:R",           min: 1,    max: 3,   step: 0.5,  unit: ":1" },
    { key: "dailyloss", label: "Stop pérdida diaria", min: 1,    max: 4,   step: 0.5,  unit: "%" },
    { key: "profitcap", label: "Cap profit diario",   min: 1,    max: 5,   step: 0.5,  unit: "%" },
  ],
};

// ════════════ Estado global ════════════
let S = null;          // último state.json
let EVENTS = [];       // eventos
let LIVE = false;
let TAB = "panel";
let SYMBOL = "XAUUSD";
let BUSY = false;
let lastT = 0;
const equityBuf = [];

// ════════════ Utilidades ════════════
const $ = (s) => document.querySelector(s);
const fmt = (n, d=2) => (n ?? 0).toLocaleString("en-US", { minimumFractionDigits: d, maximumFractionDigits: d });
const plColor = (v) => v >= 0 ? "#A8D94E" : "#F23B8C";
const plSign = (v) => v >= 0 ? "+" : "-";

// Hora servidor MT4 (GMT+7) → hora Costa Rica (GMT-6): restar 13 h
const SERVER_OFFSET_H = 13;
function toCR(s) {
  if (!s) return "";
  const m = String(s).match(/^(\d{4})\.(\d{2})\.(\d{2})\s+(\d{1,2}):(\d{2})$/);
  if (m) {
    const d = new Date(Date.UTC(+m[1], +m[2] - 1, +m[3], +m[4], +m[5]));
    d.setUTCHours(d.getUTCHours() - SERVER_OFFSET_H);
    const p = (n) => String(n).padStart(2, "0");
    return p(d.getUTCDate()) + "/" + p(d.getUTCMonth() + 1) + " " + p(d.getUTCHours()) + ":" + p(d.getUTCMinutes());
  }
  const t = String(s).match(/^(\d{1,2}):(\d{2})$/);
  if (t) {
    let h = (+t[1] - SERVER_OFFSET_H) % 24;
    if (h < 0) h += 24;
    return String(h).padStart(2, "0") + ":" + t[2];
  }
  return s;
}
const esc = (s) => String(s ?? "").replace(/[&<>"']/g, (c) => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const sleep = (ms) => new Promise((r) => setTimeout(r, ms));

async function fbGet(path) {
  const r = await fetch(BASE + "/" + path + ".json", { cache: "no-store" });
  if (!r.ok) throw new Error("HTTP " + r.status);
  return r.json();
}
async function fbPut(path, data) {
  const r = await fetch(BASE + "/" + path + ".json", { method: "PUT", body: JSON.stringify(data) });
  if (!r.ok) throw new Error("HTTP " + r.status);
  return r.json();
}
async function sendCommand(cmd) {
  const id = Date.now();
  await fbPut("cmd", Object.assign({ id }, cmd));
  for (let i = 0; i < 6; i++) {
    await sleep(2500);
    try {
      const ack = await fbGet("ack");
      if (ack && Number(ack.id) === id) return ack.ok === true;
    } catch (e) {}
  }
  return null;
}

let toastTimer = null;
function toast(msg) {
  const el = $("#toast");
  el.textContent = msg;
  el.style.display = "block";
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.style.display = "none", 3400);
}

// ════════════ Polling ════════════
async function poll() {
  try {
    const s = await fbGet("state");
    if (s && s.account) {
      S = s; LIVE = true;
      if (s.t !== lastT) {
        lastT = s.t;
        equityBuf.push(s.account.equity);
        if (equityBuf.length > 60) equityBuf.shift();
      }
    }
  } catch (e) { LIVE = false; }
  renderHeader(); renderContent();
}
async function pollEvents() {
  try {
    const ev = await fetch(BASE + '/events.json?orderBy="$key"&limitToLast=40', { cache: "no-store" }).then(r => r.json());
    if (ev) { EVENTS = Object.values(ev).reverse(); if (TAB !== "panel") renderContent(); }
  } catch (e) {}
}

// ════════════ Render: header ════════════
function renderHeader() {
  $("#acct").textContent = S ? S.account.number + " · " + (S.account.broker || "").split(" ")[0] : "conectando…";
  const dot = $("#liveDot"), txt = $("#liveTxt");
  const c = LIVE ? "#A8D94E" : "#F23B8C";
  dot.className = "pulse" + (LIVE ? " on" : "");
  dot.querySelector(".ring").style.background = c;
  dot.querySelector(".dot").style.background = c;
  txt.textContent = LIVE ? "EN VIVO" : "SIN CONEXIÓN";
  txt.style.color = c;

  const dayPL = S ? (S.eas.apex.plToday || 0) + (S.eas.london.plToday || 0) : 0;
  $("#equity").textContent = S ? "$" + fmt(S.account.equity) : "—";
  const dp = $("#dayPl");
  dp.textContent = S ? plSign(dayPL) + "$" + fmt(Math.abs(dayPL)) + " hoy" : "";
  dp.style.color = plColor(dayPL);

  // sparkline
  const host = $("#spark");
  if (equityBuf.length >= 2) {
    const w = 320, h = 56, min = Math.min(...equityBuf), max = Math.max(...equityBuf), rg = (max - min) || 1;
    const pts = equityBuf.map((v, i) => (i / (equityBuf.length - 1) * w) + "," + (h - 6 - (v - min) / rg * (h - 12))).join(" ");
    host.innerHTML = '<svg width="100%" height="' + h + '" viewBox="0 0 ' + w + ' ' + h + '" preserveAspectRatio="none">' +
      '<polyline points="' + pts + '" fill="none" stroke="' + plColor(dayPL) + '" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>' +
      '<polyline points="0,' + h + ' ' + pts + ' ' + w + ',' + h + '" fill="' + plColor(dayPL) + '" opacity="0.07"/></svg>';
  }
}

// ════════════ Render: contenido por tab ════════════
function renderContent() {
  const el = $("#content");
  if (TAB === "panel") el.innerHTML = htmlPanel();
  else if (TAB === "mercado") el.innerHTML = htmlMercado();
  else el.innerHTML = htmlTrades();
}

function htmlEACard(id) {
  const m = EA_META[id], ea = S && S.eas[id];
  const enabled = ea && ea.enabled > 0;
  const lastEv = EVENTS.find(e => e.ea === id);
  const stats = [
    ["P/L hoy",      ea ? plSign(ea.plToday) + "$" + fmt(Math.abs(ea.plToday)) : "—", plColor(ea ? ea.plToday : 0)],
    ["P/L semana",   ea ? plSign(ea.plWeek)  + "$" + fmt(Math.abs(ea.plWeek))  : "—", plColor(ea ? ea.plWeek : 0)],
    ["Win rate sem.", ea ? ea.winRate + "% (" + ea.trades + ")" : "—", "#E8ECEF"],
  ];
  let limits = "";
  if (id === "london" && ea && ea.params) {
    const bal = S.account.balance || 1;
    const lossPct = ea.plToday < 0 ? Math.abs(ea.plToday) / bal * 100 : 0;
    const profPct = ea.plToday > 0 ? ea.plToday / bal * 100 : 0;
    limits = '<div style="margin-top:16px">' +
      '<div class="lbl" style="margin-bottom:10px">Límites FundedNext</div>' +
      limitBar("Pérdida diaria", lossPct, ea.params.dailyloss || 4) +
      limitBar("Profit diario (cap)", profPct, ea.params.profitcap || 3.5) + '</div>';
  }
  const myPos = ((S && S.positions) || []).filter(p => p.ea === id);
  let liveBox;
  if (myPos.length) {
    liveBox = myPos.map(p =>
      '<div class="mono" style="margin-top:14px;font-size:12px;background:#0B0E11;border-radius:8px;padding:9px 12px;display:flex;justify-content:space-between;align-items:center">' +
        '<span><span style="color:' + (p.side === "BUY" ? "#A8D94E" : "#F23B8C") + ';font-weight:600">' + p.side + ' ' + p.lots + '</span>' +
        '<span class="muted"> @ ' + fmt(p.open, 2) + '</span></span>' +
        '<span style="font-weight:600;color:' + plColor(p.pl) + '">' + plSign(p.pl) + '$' + fmt(Math.abs(p.pl)) + '</span></div>'
    ).join("");
  } else {
    liveBox = '<div class="mono" style="margin-top:14px;font-size:12px;color:#6B7480;background:#0B0E11;border-radius:8px;padding:8px 12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">▸ ' + esc(lastEv ? lastEv.msg : "Sin eventos aún") + '</div>';
  }
  return '<div class="card" style="border-left:3px solid ' + m.color + '">' +
    '<div style="display:flex;align-items:center;justify-content:space-between">' +
      '<div style="display:flex;align-items:center;gap:10px">' +
        '<span class="pulse' + (enabled && LIVE ? " on" : "") + '"><span class="ring" style="background:' + (enabled && LIVE ? m.color : "#6B7480") + '"></span><span class="dot" style="background:' + (enabled && LIVE ? m.color : "#6B7480") + '"></span></span>' +
        '<div><div style="font-size:15px;font-weight:600">' + m.name + '</div>' +
        '<div class="mono muted" style="font-size:11px">' + m.symbol + ' · ' + m.tf + ' · ' + (ea ? (enabled ? "activo" : "pausado") : "…") + '</div></div>' +
      '</div>' +
      '<button onclick="toggleEA(\'' + id + '\')" ' + (BUSY || !S ? "disabled" : "") + ' style="padding:8px 16px;border-radius:999px;' +
        (enabled ? 'border:1px solid #1F252B;color:#E8ECEF' : 'background:#A8D94E;color:#0B0E11') + ';font-size:12px;font-weight:600">' +
        (enabled ? "Pausar" : "Activar") + '</button>' +
    '</div>' +
    '<div class="grid3">' + stats.map(s => '<div><div class="lbl">' + s[0] + '</div><div class="mono" style="font-size:14px;font-weight:600;margin-top:2px;color:' + s[2] + '">' + s[1] + '</div></div>').join("") + '</div>' +
    liveBox +
    limits +
    '<div class="btn-row">' +
      '<button class="btn-sm" style="color:' + m.color + '" onclick="openParams(\'' + id + '\')" ' + (!ea ? "disabled" : "") + '>Ajustes</button>' +
      '<button class="btn-sm" style="border-color:#3a1f2c;color:' + (ea && ea.open ? "#F23B8C" : "#3a4046") + '" onclick="closeAllEA(\'' + id + '\')" ' + (!ea || !ea.open ? "disabled" : "") + '>Cerrar trades (' + (ea ? ea.open : 0) + ')</button>' +
    '</div></div>';
}

function limitBar(label, used, max) {
  const pct = Math.min(used / max * 100, 100);
  return '<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;font-size:11px;color:#6B7480;margin-bottom:4px">' +
    '<span>' + label + '</span><span class="mono">' + fmt(used, 2) + '% / ' + max + '%</span></div>' +
    '<div style="height:4px;background:#1F252B;border-radius:2px"><div style="width:' + pct + '%;height:100%;border-radius:2px;background:' + (pct > 75 ? "#F23B8C" : "#A8D94E") + '"></div></div></div>';
}

function htmlPanel() {
  return htmlEACard("apex") + htmlEACard("london") +
    '<button onclick="panic()" ' + (BUSY || !S ? "disabled" : "") + ' style="width:100%;padding:13px;border-radius:10px;border:1px solid #3a1f2c;background:rgba(242,59,140,.08);color:#F23B8C;font-size:13px;font-weight:600;letter-spacing:.4px;margin-top:2px;' + (!S ? "opacity:.4" : "") + '">⏻ DETENER TODO</button>';
}

function htmlMercado() {
  const avail = S ? Object.keys(S.candles || {}) : [];
  let syms = ["XAUUSD", "US30"].filter(s => avail.includes(s)).concat(avail.filter(s => s !== "XAUUSD" && s !== "US30"));
  if (syms.length === 0) syms = ["XAUUSD", "US30"];
  if (!syms.includes(SYMBOL)) SYMBOL = syms[0] || "XAUUSD";
  const pills = syms.map(s => '<button class="pill' + (s === SYMBOL ? " on" : "") + ' mono" onclick="setSymbol(\'' + s + '\')">' + s + '</button>').join("");
  const tfNote = SYMBOL.indexOf("XAU") >= 0 ? "M15 · ApexGold" : "M5 · LondonBreak";
  const evts = EVENTS.length === 0
    ? '<div class="muted" style="font-size:12px">Sin eventos aún — aparecerán cuando los EAs reporten actividad.</div>'
    : EVENTS.map(e => {
        const m = EA_META[e.ea] || { color: "#6B7480", name: e.ea };
        const col = e.type === "warn" ? "#F23B8C" : e.type === "skip" ? "#6B7480" : "#E8ECEF";
        return '<div class="evt"><span style="width:6px;height:6px;border-radius:50%;margin-top:5px;flex-shrink:0;background:' + m.color + '"></span>' +
          '<div style="flex:1"><div style="font-size:12px;line-height:1.45;color:' + col + '">' + esc(e.msg) + '</div>' +
          '<div class="mono muted" style="font-size:10px;margin-top:2px">' + esc(toCR(e.t)) + ' · ' + m.name + '</div></div></div>';
      }).join("");
  return '<div style="display:flex;gap:8px;margin:10px 0 14px;align-items:center">' + pills +
    '<span class="mono muted" style="margin-left:auto;font-size:11px">' + tfNote + '</span></div>' +
    '<div class="card" style="padding:14px 10px 10px">' + candleSvg() + '</div>' +
    '<div class="sec">Registro de los bots</div>' + evts;
}

function candleSvg() {
  const candles = S && S.candles && S.candles[SYMBOL];
  if (!candles || candles.length < 2)
    return '<div style="height:200px;display:flex;align-items:center;justify-content:center;color:#6B7480;font-size:12px">Esperando velas del puente…</div>';
  const dg = SYMBOL.indexOf("XAU") >= 0 ? 2 : 1;
  const W = 360, H = 240, padR = 56, padT = 10, padB = 16, n = candles.length;
  const hi = Math.max.apply(null, candles.map(c => c[1]));
  const lo = Math.min.apply(null, candles.map(c => c[2]));
  const rg = (hi - lo) || 1;
  const Y = v => padT + (1 - (v - lo) / rg) * (H - padT - padB);
  const cw = (W - padR) / n, bw = Math.max(cw * 0.55, 2.5);
  let out = '<svg width="100%" viewBox="0 0 ' + W + ' ' + H + '" style="display:block">';
  [0.25, 0.5, 0.75].forEach(p => {
    const lv = lo + rg * p;
    out += '<line x1="0" x2="' + (W - padR) + '" y1="' + Y(lv) + '" y2="' + Y(lv) + '" stroke="#1F252B" stroke-dasharray="2 4"/>' +
      '<text x="' + (W - padR + 6) + '" y="' + (Y(lv) + 3) + '" font-size="9" fill="#6B7480" font-family="IBM Plex Mono,monospace">' + fmt(lv, dg) + '</text>';
  });
  candles.forEach((c, i) => {
    const up = c[3] >= c[0], col = up ? "#A8D94E" : "#F23B8C", x = i * cw + cw / 2;
    out += '<line x1="' + x + '" x2="' + x + '" y1="' + Y(c[1]) + '" y2="' + Y(c[2]) + '" stroke="' + col + '"/>' +
      '<rect x="' + (x - bw / 2) + '" y="' + Y(Math.max(c[0], c[3])) + '" width="' + bw + '" height="' + Math.max(Math.abs(Y(c[0]) - Y(c[3])), 1) + '" fill="' + col + '"/>';
  });
  (S.positions || []).filter(p => p.sym === SYMBOL).forEach(p => {
    const col = (EA_META[p.ea] || {}).color || "#E8ECEF";
    out += '<line x1="0" x2="' + (W - padR) + '" y1="' + Y(p.open) + '" y2="' + Y(p.open) + '" stroke="' + col + '" stroke-width="1.2" stroke-dasharray="5 4" opacity=".85"/>' +
      '<text x="4" y="' + (Y(p.open) - 4) + '" font-size="8.5" fill="' + col + '" font-family="IBM Plex Mono,monospace">' + p.side + ' ' + fmt(p.open, dg) + '</text>';
  });
  const last = candles[n - 1], lu = last[3] >= last[0], lc = lu ? "#A8D94E" : "#F23B8C";
  out += '<line x1="0" x2="' + (W - padR) + '" y1="' + Y(last[3]) + '" y2="' + Y(last[3]) + '" stroke="' + lc + '" stroke-dasharray="3 3" opacity=".7"/>' +
    '<rect x="' + (W - padR + 2) + '" y="' + (Y(last[3]) - 8) + '" width="' + (padR - 4) + '" height="16" rx="3" fill="' + lc + '"/>' +
    '<text x="' + (W - padR / 2) + '" y="' + (Y(last[3]) + 3.5) + '" font-size="9" font-weight="600" fill="#0B0E11" text-anchor="middle" font-family="IBM Plex Mono,monospace">' + fmt(last[3], dg) + '</text></svg>';
  return out;
}

function htmlTrades() {
  const pos = (S && S.positions) || [];
  let out = '<div class="sec" style="margin-top:10px">Abiertas (' + pos.length + ')</div>';
  if (pos.length === 0) out += '<div class="muted" style="font-size:12px;margin-bottom:16px">No hay posiciones abiertas.</div>';
  pos.forEach(p => {
    const col = (EA_META[p.ea] || {}).color || "#6B7480";
    out += '<div class="card" style="padding:14px;margin-bottom:10px">' +
      '<div style="display:flex;justify-content:space-between;align-items:center">' +
        '<div style="display:flex;gap:8px;align-items:center">' +
          '<span style="width:8px;height:8px;border-radius:50%;background:' + col + '"></span>' +
          '<span style="font-weight:600;font-size:14px">' + esc(p.sym) + '</span>' +
          '<span style="font-size:11px;font-weight:600;color:' + (p.side === "BUY" ? "#A8D94E" : "#F23B8C") + '">' + p.side + ' ' + p.lots + '</span>' +
        '</div>' +
        '<span class="mono" style="font-weight:600;color:' + plColor(p.pl) + '">' + plSign(p.pl) + '$' + fmt(Math.abs(p.pl)) + '</span>' +
      '</div>' +
      '<div class="mono muted" style="display:flex;gap:14px;margin-top:10px;font-size:11px;flex-wrap:wrap">' +
        '<span>Entrada ' + fmt(p.open, 2) + '</span><span>SL ' + fmt(p.sl, 2) + '</span><span>TP ' + fmt(p.tp, 2) + '</span><span>' + esc(toCR(p.time)) + '</span>' +
      '</div></div>';
  });
  const hist = (S && S.history) || [];
  out += '<div class="sec">Historial</div>';
  if (hist.length === 0)
    out += '<div class="muted" style="font-size:12px">Aún no hay cierres registrados — aparecerán aquí a medida que los bots cierren operaciones.</div>';
  hist.forEach(t => {
    const col = (EA_META[t.ea] || {}).color || "#6B7480";
    out += '<div style="display:flex;justify-content:space-between;align-items:center;padding:12px 2px;border-bottom:1px solid #14181D">' +
      '<div style="display:flex;gap:8px;align-items:center;min-width:0">' +
        '<span style="width:6px;height:6px;border-radius:50%;flex-shrink:0;background:' + col + '"></span>' +
        '<span style="font-size:13px;font-weight:500">' + esc(t.sym) + '</span>' +
        '<span style="font-size:11px;color:' + (t.side === "BUY" ? "#A8D94E" : "#F23B8C") + '">' + t.side + ' ' + t.lots + '</span>' +
        '<span class="muted" style="font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + esc(toCR(t.time)) + '</span>' +
      '</div>' +
      '<span class="mono" style="font-size:13px;font-weight:600;flex-shrink:0;color:' + plColor(t.pl) + '">' + plSign(t.pl) + '$' + fmt(Math.abs(t.pl)) + '</span>' +
    '</div>';
  });
  return out;
}

// ════════════ Sheets ════════════
function showSheet(html, accent) {
  $("#sheetHost").innerHTML = '<div class="overlay" onclick="if(event.target===this&&!window.APP_BUSY)closeSheet()">' +
    '<div class="sheet" style="border-left:3px solid ' + (accent || "#1F252B") + '">' + html + '</div></div>';
}
function closeSheet() { $("#sheetHost").innerHTML = ""; }

function confirmSheet(title, body, label, color, fn) {
  window.__confirmFn = fn;
  showSheet(
    '<div style="font-size:16px;font-weight:600;margin-bottom:8px">' + title + '</div>' +
    '<div class="muted" style="font-size:13px;margin-bottom:20px;line-height:1.5">' + body + '</div>' +
    '<button id="cfBtn" class="btn-big" style="background:' + color + ';color:' + (color === "#F5A623" || color === "#A8D94E" ? "#0B0E11" : "#fff") + '" onclick="runConfirm(this)">' + label + '</button>' +
    '<button class="btn-ghost" onclick="if(!window.APP_BUSY)closeSheet()">Cancelar</button>'
  );
}
async function runConfirm(btn) {
  btn.disabled = true; btn.style.opacity = ".7"; btn.textContent = "Enviando al puente…";
  window.APP_BUSY = true; BUSY = true;
  await window.__confirmFn();
  window.APP_BUSY = false; BUSY = false;
  closeSheet(); poll();
}

// ════════════ Acciones ════════════
async function exec(cmd, okMsg) {
  const ok = await sendCommand(cmd);
  if (ok === true) toast(okMsg + " ✓ confirmado por el puente");
  else if (ok === false) toast("El puente reportó un error — revisa Expertos en MT4");
  else toast("Sin respuesta del puente — ¿está MT4 abierto?");
}
function toggleEA(id) {
  const m = EA_META[id], enabled = S && S.eas[id].enabled > 0;
  if (enabled)
    confirmSheet("Pausar " + m.name, m.name + " dejará de abrir nuevas operaciones. Las posiciones abiertas se mantienen con su SL/TP.", "Pausar EA", "#F5A623",
      () => exec({ action: "pause", target: id }, m.name + " pausado"));
  else
    confirmSheet("Activar " + m.name, m.name + " volverá a operar según sus reglas y parámetros.", "Activar EA", "#A8D94E",
      () => exec({ action: "resume", target: id }, m.name + " activado"));
}
function closeAllEA(id) {
  const m = EA_META[id], n = S ? S.eas[id].open : 0;
  confirmSheet("Cerrar trades de " + m.name, "Se cerrarán " + n + " posición(es) REAL(es) a precio de mercado. Esta acción no se puede deshacer.", "Cerrar " + n + " posición(es)", "#F23B8C",
    () => exec({ action: "closeall", target: id }, "Cierre de " + m.name + " ejecutado"));
}
function panic() {
  confirmSheet("DETENER TODO", "Se pausarán ambos EAs y se cerrarán TODAS las posiciones abiertas a mercado. Úsalo solo en emergencias.", "Detener todo ahora", "#F23B8C",
    () => exec({ action: "panic", target: "all" }, "DETENER TODO ejecutado"));
}
function setSymbol(s) { SYMBOL = s; renderContent(); }

// ════════════ Parámetros ════════════
let PV = {};
function openParams(id) {
  const m = EA_META[id], defs = PARAM_DEFS[id], cur = (S && S.eas[id].params) || {};
  PV = {}; defs.forEach(p => PV[p.key] = cur[p.key] != null ? cur[p.key] : (p.min || 0));
  window.__paramsEA = id;
  let rows = "";
  defs.forEach(p => {
    rows += '<div style="margin-bottom:18px"><div style="display:flex;justify-content:space-between;margin-bottom:8px">' +
      '<span style="font-size:13px">' + p.label + '</span>';
    if (p.type === "toggle") {
      rows += '<button class="switch' + (PV[p.key] ? " on" : "") + '" id="sw_' + p.key + '" onclick="pvToggle(\'' + p.key + '\')" style="background:' + (PV[p.key] ? m.color : "#1F252B") + '"><span class="knob"></span></button></div>';
    } else {
      rows += '<span class="mono" id="pv_' + p.key + '" style="font-size:14px;font-weight:600;color:' + m.color + '">' + PV[p.key] + p.unit + '</span></div>' +
        '<input type="range" min="' + p.min + '" max="' + p.max + '" step="' + p.step + '" value="' + PV[p.key] + '" style="accent-color:' + m.color + '" oninput="pvSet(\'' + p.key + '\',this.value,\'' + p.unit + '\')">';
    }
    if (p.hint) rows += '<div class="muted" style="font-size:11px;margin-top:6px;line-height:1.4">' + p.hint + '</div>';
    rows += '</div>';
  });
  showSheet(
    '<div style="font-size:16px;font-weight:600">Parámetros · ' + m.name + '</div>' +
    '<div class="muted" style="font-size:12px;margin-top:4px;margin-bottom:20px">Valores actuales leídos del EA. Los cambios se envían y confirman uno por uno.</div>' +
    rows +
    '<button class="btn-big" id="pSave" style="background:' + m.color + ';color:#0B0E11" onclick="saveParams()">Enviar al EA</button>' +
    '<button class="btn-ghost" onclick="if(!window.APP_BUSY)closeSheet()">Cancelar</button>', m.color);
}
function pvSet(k, v, unit) { PV[k] = parseFloat(v); const el = $("#pv_" + k); if (el) el.textContent = PV[k] + unit; }
function pvToggle(k) {
  PV[k] = PV[k] ? 0 : 1;
  const m = EA_META[window.__paramsEA], sw = $("#sw_" + k);
  sw.classList.toggle("on", !!PV[k]);
  sw.style.background = PV[k] ? m.color : "#1F252B";
}
async function saveParams() {
  const id = window.__paramsEA, cur = (S && S.eas[id].params) || {};
  const changes = Object.entries(PV).filter(([k, v]) => v !== cur[k]);
  if (changes.length === 0) { toast("No hay cambios que enviar"); return; }
  const btn = $("#pSave"); btn.disabled = true; btn.style.opacity = ".7";
  window.APP_BUSY = true; BUSY = true;
  let okAll = true;
  for (let i = 0; i < changes.length; i++) {
    btn.textContent = "Enviando " + changes[i][0] + " (" + (i + 1) + "/" + changes.length + ")…";
    const ok = await sendCommand({ action: "setparam", target: id, key: changes[i][0], value: changes[i][1] });
    if (ok !== true) okAll = false;
  }
  window.APP_BUSY = false; BUSY = false;
  closeSheet();
  toast(okAll ? "Parámetros de " + EA_META[id].name + " aplicados ✓" : "Algún parámetro no se confirmó — verifica en MT4");
  poll();
}

// ════════════ Tabs e inicio ════════════
document.querySelectorAll(".tabbar button").forEach(b => b.addEventListener("click", () => {
  TAB = b.dataset.tab;
  document.querySelectorAll(".tabbar button").forEach(x => x.classList.toggle("on", x === b));
  renderContent();
}));

renderContent();
poll();
pollEvents();
setInterval(poll, POLL_MS);
setInterval(pollEvents, POLL_MS * 2);
</script>
</body>
</html>
